<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Debater — Design Canvas</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,500;0,8..60,600;1,8..60,400;1,8..60,500&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

<link rel="stylesheet" href="tokens.css" />

<style>
  html, body { height: 100%; overflow: hidden; background: #f0eee9; }
  body { margin: 0; }

  /* Hide scrollbars inside artboards for a clean preview */
  .dc-card * { scrollbar-width: none; }
  .dc-card *::-webkit-scrollbar { display: none; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; z-index: 200;
    background: var(--paper-0); color: var(--ink-900);
    border: 1px solid var(--ink-900);
    font-family: var(--font-ui);
    width: 260px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-header {
    padding: 12px 16px; border-bottom: 1px solid var(--ink-900);
    display: flex; justify-content: space-between; align-items: center;
    font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
  }
  .tweaks-body { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
  .tweaks-row { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .tweaks-row label { font-size: 13px; color: var(--ink-700); }
  .seg { display: inline-flex; border: 1px solid var(--ink-900); }
  .seg button {
    border: 0; background: transparent; color: var(--ink-700);
    padding: 6px 12px; font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase; cursor: pointer;
  }
  .seg button + button { border-left: 1px solid var(--ink-900); }
  .seg button.on { background: var(--ink-900); color: var(--paper); }
</style>

</head>
<body>

<div id="app"></div>

<!-- Tweaks panel -->
<div class="tweaks-panel" id="tweaks">
  <div class="tweaks-header">
    <span>Tweaks</span>
    <span style="cursor:pointer" id="tweaks-close">×</span>
  </div>
  <div class="tweaks-body">
    <div class="tweaks-row">
      <label>Theme</label>
      <div class="seg" id="seg-theme">
        <button data-v="light">Light</button>
        <button data-v="dark">Dark</button>
      </div>
    </div>
    <div style="font-family: var(--font-mono); font-size: 10px; color: var(--ink-500); letter-spacing: 0.06em; text-transform: uppercase;">
      Light paper · Dark ink
    </div>
  </div>
</div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Our modules -->
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens/DesignSystem.jsx"></script>
<script type="text/babel" src="screens/Landing.jsx"></script>
<script type="text/babel" src="screens/Setup.jsx"></script>
<script type="text/babel" src="screens/LiveDebate.jsx"></script>
<script type="text/babel" src="screens/Synthesis.jsx"></script>
<script type="text/babel" src="screens/Library.jsx"></script>

<script type="text/babel" data-presets="react">
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "light"
}/*EDITMODE-END*/;

function App() {
  const [theme, setTheme] = React.useState(TWEAK_DEFAULTS.theme);

  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  // Tweaks wiring
  React.useEffect(() => {
    const panel = document.getElementById('tweaks');
    const close = document.getElementById('tweaks-close');
    const segTheme = document.getElementById('seg-theme');
    const paintSeg = () => {
      segTheme.querySelectorAll('button').forEach(b => {
        b.classList.toggle('on', b.dataset.v === theme);
      });
    };
    paintSeg();
    segTheme.onclick = (e) => {
      const b = e.target.closest('button'); if (!b) return;
      setTheme(b.dataset.v);
      window.parent.postMessage({type:'__edit_mode_set_keys', edits:{theme: b.dataset.v}}, '*');
    };
    close.onclick = () => panel.classList.remove('open');

    const onMsg = (e) => {
      if (e.data?.type === '__activate_edit_mode') panel.classList.add('open');
      if (e.data?.type === '__deactivate_edit_mode') panel.classList.remove('open');
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return () => window.removeEventListener('message', onMsg);
  }, [theme]);

  // Standard page sizes
  const PAGE = { w: 1440, h: 1024 };
  const TALL = { w: 1440, h: 2400 };

  return (
    <DesignCanvas>

      <DCSection id="landing" title="01 · Landing" subtitle="First entry — a broadsheet front page">
        <DCArtboard id="landing-a" label="Landing · Full page" width={TALL.w} height={2200}>
          <LandingScreen />
        </DCArtboard>
      </DCSection>

      <DCSection id="system" title="02 · Design System" subtitle="Type, color, spacing, components, principles">
        <DCArtboard id="system-a" label="Design System · v0.1" width={TALL.w} height={4500}>
          <DesignSystem />
        </DCArtboard>
      </DCSection>

      <DCSection id="setup" title="03 · Setup" subtitle="Topic · mode · agents · toggles">
        <DCArtboard id="setup-a" label="Configure the Debate" width={PAGE.w} height={1450}>
          <SetupScreen />
        </DCArtboard>
      </DCSection>

      <DCSection id="live" title="04 · Live Debate" subtitle="Hero screen — three variations, all with typing cursors">
        <DCArtboard id="live-a" label="A · Broadsheet — two-column split" width={PAGE.w} height={1200}>
          <LiveDebate_Broadsheet />
        </DCArtboard>
        <DCArtboard id="live-b" label="B · Transcript — with ledger" width={PAGE.w} height={1400}>
          <LiveDebate_Transcript />
        </DCArtboard>
        <DCArtboard id="live-c" label="C · Stage — current turn spotlit" width={PAGE.w} height={1200}>
          <LiveDebate_Stage />
        </DCArtboard>
      </DCSection>

      <DCSection id="synth" title="05 · Synthesis" subtitle="The insight — verdict, ledger, open questions">
        <DCArtboard id="synth-a" label="Synthesis · Front page" width={PAGE.w} height={1850}>
          <SynthesisScreen />
        </DCArtboard>
      </DCSection>

      <DCSection id="lib" title="06 · Library" subtitle="Saved debates, forks, compare runs">
        <DCArtboard id="lib-a" label="Library · Archive" width={PAGE.w} height={1800}>
          <LibraryScreen />
        </DCArtboard>
      </DCSection>

    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App />);
</script>

</body>
</html>
